<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="100" fill="#0E0E1A"/>
  <!-- Scales of justice motif, centred. Safe zone: ~100px padding = 312px working area, centred at 256,256 -->
  <!-- Beam top bar -->
  <rect x="142" y="154" width="228" height="30" rx="7" fill="#C9A84C"/>
  <!-- Beam trapezoid shadow -->
  <polygon points="156,184 356,184 340,210 172,210" fill="#B8903C"/>
  <!-- Scales body -->
  <polygon points="174,210 338,210 348,342 164,342" fill="#C9A84C"/>
  <!-- Vertical ridges -->
  <line x1="210" y1="210" x2="200" y2="342" stroke="#0E0E1A" stroke-width="8" opacity="0.35"/>
  <line x1="236" y1="210" x2="231" y2="342" stroke="#0E0E1A" stroke-width="8" opacity="0.35"/>
  <line x1="256" y1="210" x2="256" y2="342" stroke="#0E0E1A" stroke-width="8" opacity="0.35"/>
  <line x1="276" y1="210" x2="281" y2="342" stroke="#0E0E1A" stroke-width="8" opacity="0.35"/>
  <line x1="302" y1="210" x2="312" y2="342" stroke="#0E0E1A" stroke-width="8" opacity="0.35"/>
  <!-- Base ledge -->
  <rect x="158" y="342" width="196" height="24" rx="5" fill="#B8903C"/>
  <!-- Plinth -->
  <rect x="138" y="366" width="236" height="26" rx="5" fill="#9A6E28"/>
</svg>
